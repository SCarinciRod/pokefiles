<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';" />
  <title>Pokedex Desktop | Inicializando</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="boot.css" />
</head>
<body>
  <main class="boot-shell" role="status" aria-live="polite">
    <div class="boot-badge">Pokedex Desktop</div>
    <h1 class="boot-title">Preparando o ambiente...</h1>
    <p id="boot-status" class="boot-status">Inicializando...</p>

    <div class="boot-loader" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <p class="boot-footnote">Verificando dependencias e abrindo a interface.</p>
  </main>
  <script src="boot.js"></script>
</body>
</html>
